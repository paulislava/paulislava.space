fragment ArticleCardFields on Article {
  documentId
  title
  slug
  excerpt
  createdAt
  publishedAt
  cover {
    ...MediaFields
  }
  tags {
    ...TagFields
  }
  technologies {
    ...TechnologyFields
  }
}

query GetArticles($limit: Int = 10) {
  articles(
    pagination: { limit: $limit }
    sort: "createdAt:desc"
    status: PUBLISHED
  ) {
    ...ArticleCardFields
  }
}

query GetAllArticles {
  articles(
    pagination: { limit: 100 }
    sort: "createdAt:desc"
    status: PUBLISHED
  ) {
    ...ArticleCardFields
  }
}

query GetArticleBySlug($slug: String!) {
  articles(
    filters: { slug: { eq: $slug } }
    pagination: { limit: 1 }
    status: PUBLISHED
  ) {
    ...ArticleCardFields
    content
    mainContent {
      __typename
      ... on ComponentSectionsMdxSection {
        title
        content
      }
      ... on ComponentSectionsFaqSection {
        title
        items {
          question
          answer
        }
      }
    }
  }
}
